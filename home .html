  <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>GitHub Issues Tracker Home Page</title>
  <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="bg-gray-100">

 

        <div class="navbar bg-white shadow px-8">

            <div class="flex-1 font-bold text-lg gap-2">

<img class="w-8 " src="assets/github-logo.png" alt="">
<h2>GitHub Issues Tracker</h2>

</div>

<div class="flex gap-2">

    <input id="searchInput"
type="text"
placeholder="Search issues"
class="input input-bordered w-64"/>

<button onclick="searchIssue()" class="btn btn-primary">

Search

</button>

</div>

</div>


 

<div class="p-8 max-w-7xl mx-auto">

 

<div class="tabs tabs-boxed  flex gap-2 mb-6 bg-white p-5  rounded-lg w-fit shadow ">

        <button class="tab tab-active "
onclick="loadIssues('all');setActiveTab(this)">
All
        </button>

    <button class="tab"
    onclick="loadIssues('open');setActiveTab(this)">
    Open
        </button>

<button class="tab"
onclick="loadIssues('closed');setActiveTab(this)">
Closed
</button>

</div>

 
<div class="flex items-center justify-between bg-white p-4 rounded-lg shadow mb-6">

<div class="flex items-center gap-3">

<img src="assets/Aperture.png" class="w-6 h-6"/>

<h2 id="issueCount" class="font-semibold text-gray-800">
0 Issues
</h2>

<span class="text-gray-400 text-sm">
Track and manage your project issues
</span>

</div>



<div class="flex items-center gap-4 text-sm">

<div class="flex items-center gap-1">

<span class="w-2 h-2 bg-green-500 rounded-full"></span>

<span class="text-gray-600 " >
 Open
</span>

</div>


<div class="flex items-center gap-1">

<span class="w-2 h-2 bg-purple-500 rounded-full"></span>

<span class="text-gray-600">
Closed
</span>

</div>

</div>

</div>


 

<div id="spinner" class="flex justify-center my-10 hidden">

<span class="loading loading-spinner loading-lg"></span>

</div>


 

<div id="issueContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
</div>

</div>


 

<dialog id="issueModal" class="modal">

<div class="modal-box">

<h3 id="modalTitle" class="font-bold text-lg"></h3>

<div class="flex gap-2 items-center text-sm mt-2">

<span class="badge badge-success">Opened</span>

<span id="modalAuthor"></span>

<span id="modalDate"></span>

</div>

<div class="flex gap-2 mt-3">

<span class="badge badge-error">BUG</span>

<span class="badge badge-warning">HELP WANTED</span>

</div>

<p id="modalDesc" class="py-4 text-sm"></p>

<div class="bg-base-200 p-3 rounded-lg flex justify-between">

<div>

<p class="text-xs text-gray-500">Assignee</p>

<p id="modalAuthor2"></p>

</div>

<div>

<p class="text-xs text-gray-500">Priority</p>

<p id="modalPriority"></p>

</div>

</div>

<div class="modal-action">

<form method="dialog">

<button class="btn btn-primary">
Close
</button>

</form>

</div>

</div>

</dialog>





 <script src="script.js"></script>


</body>
</html>
