<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker Login</title>

    
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 

      
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

     
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

 

<div class="bg-white w-[380px] rounded-lg shadow-lg p-8">
 

<div class="flex justify-center mb-4">
     <div class=" w-16 h-16 rounded-full flex items-center justify-center">
     <img src="assets/github-logo.png" alt="">

 
</div>

</div>

<h2 class="text-center text-xl font-semibold">
GitHub Issues Tracker
</h2>
     <p class="text-center text-gray-500 text-sm mb-6">
          Sign in to manage your issues
     </p>

<form id="loginForm">

 

<label class="text-sm font-medium">Username</label>

     <input
     id="username"
          type="text"
          placeholder="Enter Username"
          class="w-full border rounded-md px-3 py-2 mt-1 mb-1 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
          required
     />

     <p class="text-xs text-purple-600 mb-3">
     Default: admin
     </p>

 

     <label class="text-sm font-medium">Password</label>

     <input
     id="password"
     type="password"
     placeholder="Enter Password"
          class="w-full border rounded-md px-3 py-2 mt-1 mb-1 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
          required
     />

          <p class="text-xs text-purple-600 mb-4">
          Default: admin123
     </p>

     <button
     type="submit"
     class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-2 rounded-md font-medium hover:opacity-90">Sign In 
</button>

</form>

     <div class="text-center text-gray-400 text-sm my-4">
     OR
     </div>

     <div class="bg-gray-100 text-center text-sm p-3 rounded-md">

     <p class="text-gray-500 mb-1">
     Demo Credentials:
</p>

<p>Username: <b>admin</b></p>
<p>Password: <b>admin123</b></p>

</div>

</div>

 

 <script src="login.js"></script>

</body>
</html>
